version: '3.8'

services:
  # Backend API service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pdf-validator-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    networks:
      - pdf-validator-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend service
  frontend:
    build:
      context: ./aicte
      dockerfile: Dockerfile
    container_name: pdf-validator-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pdf-validator-network
    environment:
      - REACT_APP_API_URL=http://localhost:8080

networks:
  pdf-validator-network:
    driver: bridge

volumes:
  # No volumes needed for this stateless application
